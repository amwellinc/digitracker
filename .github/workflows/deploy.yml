name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  # ── 1. Build & Deploy Frontend to GitHub Pages ──────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_GHL_CLIENT_ID: ${{ secrets.VITE_GHL_CLIENT_ID }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
          VITE_STRIPE_BASIC_PRICE_ID: ${{ secrets.VITE_STRIPE_BASIC_PRICE_ID }}
          VITE_STRIPE_BUSINESS_PRICE_ID: ${{ secrets.VITE_STRIPE_BUSINESS_PRICE_ID }}
          VITE_STRIPE_PROFESSIONAL_PRICE_ID: ${{ secrets.VITE_STRIPE_PROFESSIONAL_PRICE_ID }}

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

  # ── 2. Deploy Supabase Edge Functions & Migrations ──────────────────────────
  # Cleanly SKIPPED (not silently green) if SUPABASE_ACCESS_TOKEN isn't set.
  # Once it is set, every step below runs for real and a genuine failure shows
  # up as a genuine red X — nothing here is allowed to fail silently anymore.
  supabase:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Check SUPABASE_ACCESS_TOKEN is configured
        id: check
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::SUPABASE_ACCESS_TOKEN is not set as a repo secret — skipping all Supabase deploy steps."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: supabase/setup-cli@v1
        if: steps.check.outputs.configured == 'true'
        with:
          version: latest

      - name: Link Supabase project
        if: steps.check.outputs.configured == 'true'
        run: supabase link --project-ref mllrjejqyddgaxxtjsqf

      - name: Apply database migrations
        if: steps.check.outputs.configured == 'true'
        run: supabase db push

      - name: Set GHL edge function secrets
        if: steps.check.outputs.configured == 'true'
        run: |
          supabase secrets set \
            GHL_CLIENT_ID="${{ secrets.GHL_CLIENT_ID }}" \
            GHL_CLIENT_SECRET="${{ secrets.GHL_CLIENT_SECRET }}" \
            GHL_WEBHOOK_SECRET="${{ secrets.GHL_WEBHOOK_SECRET }}"

      - name: Deploy ghl-oauth-callback
        if: steps.check.outputs.configured == 'true'
        run: supabase functions deploy ghl-oauth-callback --no-verify-jwt

      - name: Deploy ghl-webhook
        if: steps.check.outputs.configured == 'true'
        run: supabase functions deploy ghl-webhook --no-verify-jwt

      - name: Deploy admin-set-password
        if: steps.check.outputs.configured == 'true'
        run: supabase functions deploy admin-set-password

      - name: Deploy admin-set-suspension
        if: steps.check.outputs.configured == 'true'
        run: supabase functions deploy admin-set-suspension

      - name: Deploy stripe-webhook
        if: steps.check.outputs.configured == 'true'
        run: supabase functions deploy stripe-webhook --no-verify-jwt
