name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_GHL_CLIENT_ID: ${{ secrets.VITE_GHL_CLIENT_ID }}
          VITE_GHL_CLIENT_SECRET: ${{ secrets.VITE_GHL_CLIENT_SECRET }}
          VITE_GHL_LOCATION_ID: ${{ secrets.VITE_GHL_LOCATION_ID }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
          VITE_STRIPE_BASIC_PRICE_ID: ${{ secrets.VITE_STRIPE_BASIC_PRICE_ID }}
          VITE_STRIPE_BUSINESS_PRICE_ID: ${{ secrets.VITE_STRIPE_BUSINESS_PRICE_ID }}
          VITE_STRIPE_PROFESSIONAL_PRICE_ID: ${{ secrets.VITE_STRIPE_PROFESSIONAL_PRICE_ID }}

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
