name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  # ── 1. Build & Deploy Frontend to GitHub Pages ──────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_GHL_CLIENT_ID: ${{ secrets.VITE_GHL_CLIENT_ID }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
          VITE_STRIPE_BASIC_PRICE_ID: ${{ secrets.VITE_STRIPE_BASIC_PRICE_ID }}
          VITE_STRIPE_BUSINESS_PRICE_ID: ${{ secrets.VITE_STRIPE_BUSINESS_PRICE_ID }}
          VITE_STRIPE_PROFESSIONAL_PRICE_ID: ${{ secrets.VITE_STRIPE_PROFESSIONAL_PRICE_ID }}

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

  # ── 2. Deploy Supabase Edge Functions & Migrations ──────────────────────────
  # This job runs when SUPABASE_ACCESS_TOKEN secret is configured.
  # Skip gracefully if the token is not set (all steps have continue-on-error).
  supabase:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        continue-on-error: true
        with:
          version: latest

      - name: Link Supabase project
        continue-on-error: true
        run: supabase link --project-ref mllrjejqyddgaxxtjsqf

      - name: Apply database migrations
        continue-on-error: true
        run: supabase db push

      - name: Set GHL edge function secrets
        continue-on-error: true
        run: |
          supabase secrets set \
            GHL_CLIENT_ID="${{ secrets.GHL_CLIENT_ID }}" \
            GHL_CLIENT_SECRET="${{ secrets.GHL_CLIENT_SECRET }}" \
            GHL_WEBHOOK_SECRET="${{ secrets.GHL_WEBHOOK_SECRET }}"

      - name: Deploy ghl-oauth-callback
        continue-on-error: true
        run: supabase functions deploy ghl-oauth-callback --no-verify-jwt

      - name: Deploy ghl-webhook
        continue-on-error: true
        run: supabase functions deploy ghl-webhook --no-verify-jwt

      - name: Deploy admin-set-password
        continue-on-error: true
        run: supabase functions deploy admin-set-password
