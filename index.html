<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="DIGITRACKER — Remote workforce management" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <title>DIGITRACKER</title>
    <style>
      :root {
        --color-brand: #7c3aed;
        --color-brand-light: #ede9fe;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!--
      Path-to-hash bridges for GitHub Pages + HashRouter.

      GitHub Pages serves index.html for every path (SPA fallback).
      Supabase and GHL deliver callbacks as real paths with query params —
      but HashRouter only reads the hash fragment. These bridges detect
      each callback path and rewrite the URL into the hash before the
      React app boots, so the correct route receives the right params.
    -->
    <script>
      (function () {
        var p = window.location.pathname;
        var s = window.location.search;

        // GHL OAuth: /ghl/callback?code=...&state=... → /#/ghl/callback?code=...&state=...
        if (p === '/ghl/callback' && s.indexOf('code=') !== -1) {
          window.location.replace('/#/ghl/callback' + s);
          return;
        }

        // Password reset: /auth/reset?code=... → /#/reset-password?code=...
        // sendPasswordReset() uses redirectTo: origin/auth/reset so the PKCE code
        // lands as a real query param (?code=XXX) rather than inside the hash where
        // Supabase JS cannot find it.
        if (p === '/auth/reset' && s.indexOf('code=') !== -1) {
          window.location.replace('/#/reset-password' + s);
          return;
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
